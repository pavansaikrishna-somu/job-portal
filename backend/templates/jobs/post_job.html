{% extends 'base.html' %}
{% block title %}{{ page_title }} | CareerConnect{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-card hover-lift p-4">
                <h1 class="h3 mb-2">{{ page_title }}</h1>
                <p class="text-muted mb-4">Publish a role that attracts high-quality candidates.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="title" placeholder="Job Title" value="{{ form.title.value|default:'' }}" required>
                                <label>Job Title</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="company" placeholder="Company" value="{{ form.company.value|default:'' }}" required>
                                <label>Company</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="location" placeholder="Location" value="{{ form.location.value|default:'' }}" required>
                                <label>Location</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="salary" placeholder="Salary" value="{{ form.salary.value|default:'' }}" required>
                                <label>Salary</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="experience" placeholder="Experience" value="{{ form.experience.value|default:'' }}" required>
                                <label>Experience</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" name="skills_required" placeholder="Skills Required" value="{{ form.skills_required.value|default:'' }}" required>
                                <label>Skills Required (Python, Django, MongoDB)</label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="form-floating">
                                <textarea class="form-control" name="description" placeholder="Description" rows="5" style="height: 160px" required>{{ form.description.value|default:'' }}</textarea>
                                <label>Description</label>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button type="submit" class="btn btn-premium">Save Job</button>
                        <a href="{% url 'jobs:manage_jobs' %}" class="btn btn-outline-dark">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
